<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyseur Toiture & Télécoms</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; max-width: 960px; margin: 0 auto; padding: 20px; background: #f8f8f8; }
        h1 { color: #2c3e50; text-align: center; }
        .card { background: white; border-radius: 8px; padding: 20px; margin: 20px 0; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        input, button { padding: 10px; margin: 5px; border-radius: 8px; border: 2px solid #5555ff; font-size: 16px; }
        button { background: #5555ff; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background: #4444dd; }
        .map-container { height: 400px; border-radius: 8px; overflow: hidden; margin: 10px 0; }
        .section-header { background: #2c3e50; color: white; padding: 12px; border-radius: 8px; margin: 20px 0 10px 0; font-weight: bold; }
        .links-group { display: flex; gap: 10px; flex-wrap: wrap; margin: 15px 0; }
        .btn-small { padding: 8px 15px; font-size: 14px; margin: 5px; }
        #suggestions { position: absolute; top: 45px; left: 0; right: 0; background: white; border: 2px solid #5555ff; border-top: none; border-radius: 0 0 8px 8px; max-height: 300px; overflow-y: auto; z-index: 1000; }
        .suggestion-item { padding: 12px; border-bottom: 1px solid #e0e0e0; cursor: pointer; transition: background 0.2s; }
        .suggestion-item:hover { background: #f0f0ff; }
        .input-wrapper { position: relative; }
        h2 { color: #5555ff; margin-top: 20px; }
        .slider-container { margin: 20px 0; }
        input[type="range"] { width: 100%; }
        .badge { display: inline-block; background: #5555ff; color: white; padding: 5px 15px; border-radius: 20px; font-weight: bold; }
        .error { color: #e74c3c; padding: 10px; background: #fadbd8; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>🏠 Analyseur Toiture & Télécoms</h1>

    <div class="card">
        <h2>📍 Section 1 — Analyse du bâtiment</h2>
        
        <label>Adresse :</label>
        <div class="input-wrapper">
            <input type="text" id="addressInput" placeholder="Entrez une adresse (ex: 13 boulevard gustave roch)" style="width: 100%;">
            <div id="suggestions"></div>
        </div>

        <label>Ville :</label>
        <input type="text" id="cityInput" placeholder="Nantes" style="width: 100%;">

        <label>Code postal :</label>
        <input type="text" id="postalInput" placeholder="44000" readonly style="width: 100%; background: #f0f0f0;">

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">
            <div>
                <h3>📍 Localisation</h3>
                <div id="mapLocation" class="map-container"></div>
                <div class="links-group">
                    <button class="btn-small" onclick="openGoogleMaps()">🗺️ Google Maps</button>
                    <button class="btn-small" onclick="openGoogleEarth()">🌍 Google Earth</button>
                    <button class="btn-small" onclick="openCadastre()">📋 Cadastre</button>
                </div>
            </div>

            <div>
                <h3>📋 Carte Cadastrale</h3>
                <iframe id="cadastreFrame" style="width: 100%; height: 400px; border-radius: 8px; border: none;" src=""></iframe>
            </div>
        </div>
    </div>

    <div class="card">
        <h2>📡 Section 2 — Présence opérateurs télécom</h2>
        
        <div class="slider-container">
            <label>Rayon de recherche : <span class="badge" id="radiusBadge">200 m</span></label>
            <input type="range" id="radiusSlider" min="50" max="1000" value="200" step="50">
        </div>

        <div id="mapOperators" class="map-container"></div>
        
        <div class="links-group">
            <button class="btn-small" onclick="openANFR()">📊 ANFR</button>
            <button class="btn-small" onclick="openCartoradio()">📡 Cartoradio</button>
        </div>
    </div>

    <script>
        let currentLat, currentLon;
        let mapLocation, mapOperators;
        let suggestions = [];

        // ===== AUTOCOMPLÉTION ADRESSE =====
        document.getElementById('addressInput').addEventListener('input', async (e) => {
            const value = e.target.value;
            const city = document.getElementById('cityInput').value;
            
            if (value.length < 3) {
                document.getElementById('suggestions').innerHTML = '';
                return;
            }

            try {
                const query = `${value}${city ? ', ' + city : ''}`;
                const response = await fetch(
                    `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=10`
                );
                suggestions = await response.json();

                const html = suggestions.map((s, i) => `
                    <div class="suggestion-item" onclick="selectSuggestion(${i})">
                        <strong>${s.address.split(',')[0]}</strong><br>
                        <small>${s.address}</small>
                    </div>
                `).join('');

                document.getElementById('suggestions').innerHTML = html;

            } catch (error) {
                console.error('Erreur autocomplétion:', error);
            }
        });

        // ===== SÉLECTIONNER UNE SUGGESTION =====
        function selectSuggestion(index) {
            const result = suggestions[index];
            
            currentLat = parseFloat(result.lat);
            currentLon = parseFloat(result.lon);

            // Remplir les champs
            document.getElementById('addressInput').value = result.address.split(',')[0];
            document.getElementById('cityInput').value = result.address.split(',')[1]?.trim() || '';
            
            // Récupérer le code postal
            const reverseUrl = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${currentLat}&lon=${currentLon}`;
            fetch(reverseUrl)
                .then(r => r.json())
                .then(data => {
                    const postal = data.address?.postcode || '';
                    document.getElementById('postalInput').value = postal;
                });

            // Fermer suggestions
            document.getElementById('suggestions').innerHTML = '';

            // Mettre à jour les cartes
            updateMapLocation();
            updateMapOperators();
        }

        // ===== MISE À JOUR CARTE LOCALISATION =====
        function updateMapLocation() {
            if (!currentLat || !currentLon) return;
            
            const mapContainer = document.getElementById('mapLocation');
            
            if (mapLocation) {
                mapLocation.remove();
            }

            mapLocation = L.map('mapLocation').setView([currentLat, currentLon], 16);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap',
                maxZoom: 19
            }).addTo(mapLocation);

            L.marker([currentLat, currentLon]).addTo(mapLocation)
                .bindPopup('<b>' + document.getElementById('addressInput').value + '</b>');
        }

        // ===== MISE À JOUR CARTE OPÉRATEURS =====
        async function updateMapOperators() {
            if (!currentLat || !currentLon) return;

            const radius = parseInt(document.getElementById('radiusSlider').value);
            const mapContainer = document.getElementById('mapOperators');
            
            if (mapOperators) {
                mapOperators.remove();
            }

            mapOperators = L.map('mapOperators').setView([currentLat, currentLon], 16);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap',
                maxZoom: 19
            }).addTo(mapOperators);

            // Marqueur adresse
            L.marker([currentLat, currentLon], { 
                icon: L.icon({
                    iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
                    shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                    iconSize: [25, 41],
                    iconAnchor: [12, 41],
                    popupAnchor: [1, -34],
                    shadowSize: [41, 41]
                })
            }).addTo(mapOperators).bindPopup('<b>Votre adresse</b>');

            // Cercle rayon
            L.circle([currentLat, currentLon], {
                color: '#5555ff',
                fillColor: '#5555ff',
                fillOpacity: 0.1,
                radius: radius
            }).addTo(mapOperators);

            // Antennes Overpass
            try {
                const bbox = `${currentLat - 0.01},${currentLon - 0.01},${currentLat + 0.01},${currentLon + 0.01}`;
                const query = `[bbox:${bbox}];(node["man_made"="mast"];node["man_made"="tower"];);out;`;
                
                const response = await fetch('https://overpass-api.de/api/interpreter', {
                    method: 'POST',
                    body: query
                });
                const data = await response.json();

                data.elements?.forEach(el => {
                    if (el.lat && el.lon) {
                        const dist = haversine(currentLat, currentLon, el.lat, el.lon);
                        if (dist <= radius) {
                            L.marker([el.lat, el.lon], {
                                icon: L.icon({
                                    iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-orange.png',
                                    shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                                    iconSize: [25, 41],
                                    iconAnchor: [12, 41],
                                    popupAnchor: [1, -34],
                                    shadowSize: [41, 41]
                                })
                            }).addTo(mapOperators).bindPopup(`<b>Antenne</b><br>${dist.toFixed(0)}m`);
                        }
                    }
                });
            } catch (error) {
                console.error('Erreur Overpass:', error);
            }
        }

        // ===== DISTANCE HAVERSINE =====
        function haversine(lat1, lon1, lat2, lon2) {
            const R = 6371000;
            const φ1 = lat1 * Math.PI / 180;
            const φ2 = lat2 * Math.PI / 180;
            const Δφ = (lat2 - lat1) * Math.PI / 180;
            const Δλ = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
                      Math.cos(φ1) * Math.cos(φ2) *
                      Math.sin(Δλ/2) * Math.sin(Δλ/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        // ===== SLIDER RAYON =====
        document.getElementById('radiusSlider').addEventListener('input', (e) => {
            document.getElementById('radiusBadge').textContent = e.target.value + ' m';
            if (mapOperators) {
                updateMapOperators();
            }
        });

        // ===== LIENS EXTERNES =====
        function openGoogleMaps() {
            if (!currentLat || !currentLon) {
                alert('Sélectionnez une adresse d\'abord');
                return;
            }
            window.open(`https://www.google.com/maps?q=${currentLat},${currentLon}`, '_blank');
        }

        function openGoogleEarth() {
            if (!currentLat || !currentLon) {
                alert('Sélectionnez une adresse d\'abord');
                return;
            }
            window.open(`https://earth.google.com/web/@${currentLat},${currentLon},0a,1000000m`, '_blank');
        }

        function openCadastre() {
            const address = document.getElementById('addressInput').value;
            const postal = document.getElementById('postalInput').value;
            if (!address || !postal) {
                alert('Remplissez l\'adresse et le code postal');
                return;
            }
            window.open(`https://www.cadastre.gouv.fr/scpc/accueil`, '_blank');
        }

        function openANFR() {
            if (!currentLat || !currentLon) {
                alert('Sélectionnez une adresse d\'abord');
                return;
            }
            window.open(`https://www.anfr.fr/cartoradio/#/mapa/terrestre`, '_blank');
        }

        function openCartoradio() {
            if (!currentLat || !currentLon) {
                alert('Sélectionnez une adresse d\'abord');
                return;
            }
            window.open(`https://www.cartoradio.fr/`, '_blank');
        }
    </script>
</body>
</html>
